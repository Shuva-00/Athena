###############################################################################
# Athena
# Path Configuration
###############################################################################

###############################################################################
# Root Directories
###############################################################################

root:

  data: data

  outputs: outputs

  models: models

  configs: configs

###############################################################################
# Input Data
###############################################################################

input:

  candidates: data/raw/candidates.json

  job_description: data/raw/job_description.json

###############################################################################
# Output Files
###############################################################################

output:

  submission_directory: outputs/submissions

  submission_csv: outputs/submissions/submission.csv

  submission_zip: outputs/submissions/submission.zip

###############################################################################
# Reports
###############################################################################

reports:

  benchmark: outputs/reports/benchmark.txt

  evaluation: outputs/reports/evaluation.txt

###############################################################################
# Logs
###############################################################################

logs:

  directory: outputs/logs

  file: outputs/logs/athena.log

###############################################################################
# Models
###############################################################################

pretrained:

  embedding: models/embedding

  cross_encoder: models/cross_encoder
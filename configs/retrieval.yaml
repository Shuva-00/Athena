###############################################################################
# Athena
# Retrieval Configuration
###############################################################################

###############################################################################
# BM25 Retrieval
###############################################################################

bm25:

  top_k: 100

  lowercase: true

  tokenizer: whitespace

###############################################################################
# Dense Retrieval
###############################################################################

dense:

  top_k: 100

  normalize_embeddings: true
  faiss_metric: cosine
###############################################################################
# Reciprocal Rank Fusion (RRF)
###############################################################################

fusion:

  final_top_k: 100

  rrf_k: 60


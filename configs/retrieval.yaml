###############################################################################
# Athena
# Retrieval Configuration
###############################################################################

###############################################################################
# BM25 Retrieval
###############################################################################

bm25:

  top_k: 100

  lowercase: true

  tokenizer: whitespace

###############################################################################
# Dense Retrieval
###############################################################################

dense:

  top_k: 100

  normalize_embeddings: true

###############################################################################
# Reciprocal Rank Fusion (RRF)
###############################################################################

fusion:

  final_top_k: 100

  rrf_k: 60

###############################################################################
# Retrieval Pipeline
###############################################################################

pipeline:

  build_bm25_index: true

  build_dense_index: true

  enable_hybrid_retrieval: true